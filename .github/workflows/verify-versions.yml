name: Verify Versions
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
env:
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false -Dkotlin.incremental=false"
jobs:
  verify-versions:
    runs-on: ubuntu-latest
    steps:
      # full history: snapshot versionCodes derive from the git commit count
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      # the sync script queries gradle for the pinned snapshot build number
      - name: Set up JDK 23
        uses: actions/setup-java@v5
        with:
          java-version: '23'
          distribution: 'zulu'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Verify committed versions are in sync
        run: ./scripts/verify-versions.sh
