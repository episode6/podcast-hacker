name: Build Installers
on:
  pull_request:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
env:
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false -Dkotlin.incremental=false"
jobs:
  desktop-app:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            task: packageDmg
            format: dmg
            # keep the iOS shard's work out of the installer job
            extra-args: -x :shared:iosSimulatorArm64Test
          - os: windows-latest
            task: packageMsi
            format: msi
            extra-args: ''
          - os: ubuntu-latest
            task: packageDeb
            format: deb
            extra-args: ''
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 23
        uses: actions/setup-java@v5
        with:
          java-version: '23'
          distribution: 'zulu'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Fetch libvlc for bundling
        shell: bash
        run: ./scripts/fetch-libvlc.sh
      - name: Check and build installer
        run: ./gradlew check :desktopApp:${{ matrix.task }} ${{ matrix.extra-args }}
      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.os }}
          path: shared/build/test-results/
          if-no-files-found: ignore
      # archive: false uploads the installer as-is (not wrapped in a zip).
      # Only a single file may be uploaded this way and its filename becomes
      # the artifact name.
      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          path: desktopApp/build/compose/binaries/main/${{ matrix.format }}/*.${{ matrix.format }}
          archive: false
          if-no-files-found: error

  android-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 23
        uses: actions/setup-java@v5
        with:
          java-version: '23'
          distribution: 'zulu'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      # check includes android lint + unit tests for :androidApp and :shared
      - name: Check and build debug APK
        run: ./gradlew check :androidApp:assembleDebug
      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-android-job
          path: shared/build/test-results/
          if-no-files-found: ignore
      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          path: androidApp/build/outputs/apk/debug/*.apk
          archive: false
          if-no-files-found: error

  ios-check:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      # macos-latest runners differ in default Xcode (16.4 vs 26.x); Compose
      # 1.11 uikit interop needs the iOS 26 SDK to link, so pick the newest
      - name: Select latest Xcode
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"
          xcodebuild -version
      - name: Set up JDK 23
        uses: actions/setup-java@v5
        with:
          java-version: '23'
          distribution: 'zulu'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Link iOS framework
        run: ./gradlew :shared:linkDebugFrameworkIosSimulatorArm64
      - name: Run iOS simulator tests
        run: ./gradlew :shared:iosSimulatorArm64Test
      - name: Build iOS app
        run: |
          xcodebuild \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build

  release:
    needs: [desktop-app, android-apk]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
      - name: Attach artifacts to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
