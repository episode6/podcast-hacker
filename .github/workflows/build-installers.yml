name: Build Installers
on:
  pull_request:
    # labeled is included so applying 'build-release' reruns the android job
    # as a signed release build
    types: [opened, synchronize, reopened, labeled]
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
env:
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false -Dkotlin.incremental=false"
jobs:
  desktop-app:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            task: packageDmg
            format: dmg
            # keep the iOS shard's work out of the installer job
            extra-args: -x :shared:iosSimulatorArm64Test
          - os: windows-latest
            task: packageMsi
            format: msi
            extra-args: ''
          - os: ubuntu-latest
            task: packageDeb
            format: deb
            extra-args: ''
    runs-on: ${{ matrix.os }}
    steps:
      # full history: snapshot versionCodes derive from the git commit count
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up JDK 23
        uses: actions/setup-java@v5
        with:
          java-version: '23'
          distribution: 'zulu'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Fetch libvlc for bundling
        shell: bash
        run: ./scripts/fetch-libvlc.sh
      - name: Check and build installer
        run: ./gradlew check :desktopApp:${{ matrix.task }} ${{ matrix.extra-args }}
      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.os }}
          path: shared/build/test-results/
          if-no-files-found: ignore
      # archive: false uploads the installer as-is (not wrapped in a zip).
      # Only a single file may be uploaded this way and its filename becomes
      # the artifact name.
      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          path: desktopApp/build/compose/binaries/main/${{ matrix.format }}/*.${{ matrix.format }}
          archive: false
          if-no-files-found: error

  android-apk:
    runs-on: ubuntu-latest
    # PRs build debug; pushes to main/tags (and manual runs) build a signed
    # release. A PR authored by ghackett with the 'build-release' label also
    # builds a signed release.
    env:
      BUILD_TYPE: ${{ (github.event_name != 'pull_request' || (contains(github.event.pull_request.labels.*.name, 'build-release') && github.event.pull_request.user.login == 'ghackett')) && 'release' || 'debug' }}
    outputs:
      build-type: ${{ steps.build-info.outputs.build-type }}
      artifact-url: ${{ steps.upload-apk.outputs.artifact-url }}
    steps:
      # full history: snapshot versionCodes derive from the git commit count
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up JDK 23
        uses: actions/setup-java@v5
        with:
          java-version: '23'
          distribution: 'zulu'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Decode release keystore
        if: env.BUILD_TYPE == 'release'
        env:
          ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}
        run: |
          if [ -z "$ANDROID_KEYSTORE" ]; then
            echo "ANDROID_KEYSTORE secret is not set; refusing to build an unsigned release" >&2
            exit 1
          fi
          echo "$ANDROID_KEYSTORE" | base64 -d > "$RUNNER_TEMP/keystore.jks"
          echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/keystore.jks" >> "$GITHUB_ENV"
      # check includes android lint + unit tests for :androidApp and :shared
      - name: Check and build APK
        run: ./gradlew check :androidApp:assemble${{ env.BUILD_TYPE == 'release' && 'Release' || 'Debug' }}
        env:
          ANDROID_KEYSTORE_ROOT_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_ROOT_PASSWORD }}
          ANDROID_KEYSTORE_KEY_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_KEY_PASSWORD }}
      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-android-job
          path: shared/build/test-results/
          if-no-files-found: ignore
      # job-level env isn't reliably available in job outputs, so surface
      # BUILD_TYPE through a step output for the apk-comment job
      - name: Record build type
        id: build-info
        run: echo "build-type=$BUILD_TYPE" >> "$GITHUB_OUTPUT"
      - name: Upload APK artifact
        id: upload-apk
        uses: actions/upload-artifact@v7
        with:
          path: androidApp/build/outputs/apk/${{ env.BUILD_TYPE }}/*.apk
          archive: false
          if-no-files-found: error

  apk-comment:
    needs: [android-apk]
    runs-on: ubuntu-latest
    permissions:
      contents: write        # commit comments
      pull-requests: write   # PR comments
    env:
      ARTIFACT_URL: ${{ needs.android-apk.outputs.artifact-url }}
      BUILD_TYPE: ${{ needs.android-apk.outputs.build-type }}
      # PAT with contents:write on episode6/qrcodes; QR steps are skipped
      # (and the comment posts without an image) when it isn't configured
      QRCODES_TOKEN: ${{ secrets.QRCODES_GITHUB_TOKEN }}
    steps:
      - name: Generate QR code and push it to episode6/qrcodes
        id: qr
        if: env.QRCODES_TOKEN != ''
        env:
          GH_TOKEN: ${{ secrets.QRCODES_GITHUB_TOKEN }}
        run: |
          sudo apt-get update -q
          sudo apt-get install -yq qrencode
          qrencode -o qr.png -s 8 -m 2 "$ARTIFACT_URL"
          path="podcast-hacker/run-${{ github.run_id }}-${{ github.run_attempt }}.png"
          gh api -X PUT "repos/episode6/qrcodes/contents/$path" \
            -f message="Add APK QR code for podcast-hacker run ${{ github.run_id }} (attempt ${{ github.run_attempt }})" \
            -f content="$(base64 -w0 qr.png)" > /dev/null
          echo "image-url=https://raw.githubusercontent.com/episode6/qrcodes/main/$path" >> "$GITHUB_OUTPUT"
      - name: Comment APK link on the PR or commit
        env:
          GH_TOKEN: ${{ github.token }}
          QR_IMAGE_URL: ${{ steps.qr.outputs.image-url }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          {
            echo "<!-- apk-build-comment -->"
            echo "### 📦 ${BUILD_TYPE^} APK from this build"
            echo
            echo "**[Download the APK](${ARTIFACT_URL})** (workflow-run artifact; requires a GitHub login and expires with the run's retention window)"
            if [ -n "$QR_IMAGE_URL" ]; then
              echo
              echo "Scan to download on a device:"
              echo
              echo "![QR code linking to the APK](${QR_IMAGE_URL})"
            fi
          } > comment.md
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            # keep one comment per PR: update the marker comment if it exists
            existing=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" --paginate \
              --jq '.[] | select(.body | startswith("<!-- apk-build-comment -->")) | .id' | head -n1)
            if [ -n "$existing" ]; then
              gh api -X PATCH "repos/${{ github.repository }}/issues/comments/${existing}" -F body=@comment.md > /dev/null
            else
              gh api -X POST "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" -F body=@comment.md > /dev/null
            fi
          else
            gh api -X POST "repos/${{ github.repository }}/commits/${{ github.sha }}/comments" -F body=@comment.md > /dev/null
          fi

  ios-check:
    runs-on: macos-latest
    steps:
      # full history: snapshot versionCodes derive from the git commit count
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      # macos-latest runners differ in default Xcode (16.4 vs 26.x); Compose
      # 1.11 uikit interop needs the iOS 26 SDK to link, so pick the newest
      - name: Select latest Xcode
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"
          xcodebuild -version
      - name: Set up JDK 23
        uses: actions/setup-java@v5
        with:
          java-version: '23'
          distribution: 'zulu'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      # the committed xcconfig pins the snapshot build number; release-tag builds swap
      # in the formula-derived code (workspace-only change, never committed)
      - name: Use release build number on tag builds
        if: startsWith(github.ref, 'refs/tags/v')
        run: ./scripts/sync-ios-version.sh --release
      - name: Link iOS framework
        run: ./gradlew :shared:linkDebugFrameworkIosSimulatorArm64
      - name: Run iOS simulator tests
        run: ./gradlew :shared:iosSimulatorArm64Test
      - name: Build iOS app
        run: |
          xcodebuild \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build

  release:
    needs: [desktop-app, android-apk]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
      - name: Attach artifacts to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
