name: Build Installers
on:
  pull_request:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
env:
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false -Dkotlin.incremental=false"
jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            task: packageDmg
            format: dmg
          - os: windows-latest
            task: packageMsi
            format: msi
          - os: ubuntu-latest
            task: packageDeb
            format: deb
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 23
        uses: actions/setup-java@v5
        with:
          java-version: '23'
          distribution: 'zulu'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      # check covers each host's tests (on macOS that includes the iOS
      # simulator tests for :shared)
      - name: Check and build installer
        run: ./gradlew check :desktopApp:${{ matrix.task }}
      - name: Build iOS app
        if: runner.os == 'macOS'
        run: |
          xcodebuild \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build
      # archive: false uploads the installer as-is (not wrapped in a zip).
      # Only a single file may be uploaded this way and its filename becomes
      # the artifact name.
      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          path: desktopApp/build/compose/binaries/main/${{ matrix.format }}/*.${{ matrix.format }}
          archive: false
          if-no-files-found: error

  android-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 23
        uses: actions/setup-java@v5
        with:
          java-version: '23'
          distribution: 'zulu'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      # check includes android lint + unit tests for :androidApp and :shared
      - name: Check and build debug APK
        run: ./gradlew check :androidApp:assembleDebug
      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          path: androidApp/build/outputs/apk/debug/*.apk
          archive: false
          if-no-files-found: error

  release:
    needs: [package, android-apk]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
      - name: Attach artifacts to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
