name: Android Device Tests
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
env:
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false -Dkotlin.incremental=false"
jobs:
  device-tests:
    runs-on: ubuntu-latest
    steps:
      # full history: snapshot versionCodes derive from the git commit count
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      # hardware acceleration for the emulator; ubuntu runners ship KVM but the
      # device node isn't world-accessible by default
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Set up JDK 23
        uses: actions/setup-java@v5
        with:
          java-version: '23'
          distribution: 'zulu'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Run device tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          # 34+ so the UIDT download-scheduler path (not the dataSync fallback)
          # is what gets exercised
          api-level: 36
          target: google_apis
          arch: x86_64
          # the default AVD is a 320x640 relic; use a realistic phone screen
          profile: pixel_6
          disable-animations: true
          # retry once in the same emulator session: the compose test harness has a
          # known flaky espresso/render race ("performMeasureAndLayout called during
          # measure layout", issuetracker.google.com/325299275) that can fail an
          # otherwise-green run
          script: ./gradlew :androidApp:connectedDebugAndroidTest || ./gradlew :androidApp:connectedDebugAndroidTest
      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: device-test-results
          path: |
            androidApp/build/outputs/androidTest-results/
            androidApp/build/reports/androidTests/
          if-no-files-found: ignore
